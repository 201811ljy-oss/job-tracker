<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="求职追踪">
  <title>央国企求职追踪</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a202c;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --primary: #1a56db;
      --primary-light: #dbeafe;
      --success: #059669;
      --success-light: #d1fae5;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --tier1: #2563eb;
      --tier2: #7c3aed;
      --tier3: #059669;
      --tier4: #d97706;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1e3a5f 0%, #1a56db 100%);
      color: #fff;
      padding: 16px 20px;
      box-shadow: 0 2px 10px rgba(26,86,219,.25);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub { font-size: 13px; opacity: .85; margin-top: 2px; }

    /* Stats row */
    .stats { display: flex; gap: 8px; padding: 16px 16px 0; overflow-x: auto; }
    .stat-card {
      flex: 0 0 auto; min-width: 72px;
      background: var(--card); border-radius: var(--radius-sm);
      padding: 12px 14px; text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-card .num { font-size: 24px; font-weight: 700; line-height: 1; }
    .stat-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .stat-card.total .num { color: var(--primary); }
    .stat-card.applied .num { color: var(--warning); }
    .stat-card.interview .num { color: var(--tier2); }
    .stat-card.offer .num { color: var(--success); }

    /* Filters */
    .filters { padding: 12px 16px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex: 0 0 auto; padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 13px; cursor: pointer; white-space: nowrap;
      transition: all .15s; color: var(--text-secondary);
    }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .search-bar { padding: 0 16px 12px; }
    .search-input {
      width: 100%; padding: 10px 16px; border-radius: 24px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 14px; outline: none; transition: border .15s;
    }
    .search-input:focus { border-color: var(--primary); }

    /* Company list */
    .list { padding: 0 16px; }
    .company-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
      box-shadow: var(--shadow); cursor: pointer;
      transition: all .15s; border-left: 4px solid transparent;
      position: relative;
    }
    .company-card:active { transform: scale(.985); }
    .company-card.tier1 { border-left-color: var(--tier1); }
    .company-card.tier2 { border-left-color: var(--tier2); }
    .company-card.tier3 { border-left-color: var(--tier3); }
    .company-card.tier4 { border-left-color: var(--tier4); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .card-tier {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      font-weight: 500; white-space: nowrap;
    }
    .card-tier.t1 { background: #dbeafe; color: #1e40af; }
    .card-tier.t2 { background: #ede9fe; color: #6d28d9; }
    .card-tier.t3 { background: #d1fae5; color: #065f46; }
    .card-tier.t4 { background: #fef3c7; color: #92400e; }

    .card-info { margin-top: 6px; font-size: 12px; color: var(--text-secondary); }
    .card-info span { margin-right: 12px; }

    .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .status-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
    }
    .status-未投递 { background: #f1f5f9; color: #64748b; }
    .status-已投递 { background: #fef3c7; color: #92400e; }
    .status-测评中 { background: #e0e7ff; color: #3730a3; }
    .status-笔试 { background: #dbeafe; color: #1e40af; }
    .status-面试 { background: #ede9fe; color: #6d28d9; }
    .status-已录用 { background: #d1fae5; color: #065f46; }
    .status-已拒绝 { background: #fee2e2; color: #991b1b; }
    .status-放弃 { background: #f1f5f9; color: #94a3b8; }

    .card-date { font-size: 11px; color: var(--text-secondary); }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; padding: 6px 0 env(safe-area-inset-bottom);
      box-shadow: 0 -2px 8px rgba(0,0,0,.05); z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px; cursor: pointer; font-size: 10px; color: var(--text-secondary);
      transition: color .15s;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; margin-bottom: 2px; }

    /* Modal / Detail panel */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 200; display: none; align-items: flex-end;
    }
    .overlay.show { display: flex; }
    .sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      width: 100%; max-height: 85vh; overflow-y: auto;
      padding: 20px 20px 30px;
    }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .sheet-title { font-size: 18px; font-weight: 700; }
    .sheet-close { font-size: 24px; cursor: pointer; color: var(--text-secondary); padding: 4px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); font-size: 14px; outline: none;
      background: var(--bg); transition: border .15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--primary); }
    .btn {
      padding: 10px 24px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:active { transform: scale(.97); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--danger); }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Export bar */
    .export-bar {
      padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .btn-sm {
      padding: 6px 14px; border-radius: 16px; border: 1.5px solid var(--border);
      background: var(--card); font-size: 12px; cursor: pointer;
      color: var(--text-secondary);
    }
    .btn-sm:active { background: var(--bg); }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1a202c; color: #fff; padding: 10px 24px;
      border-radius: 24px; font-size: 13px; z-index: 300;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Install banner */
    .install-banner {
      display: none; background: #dbeafe; padding: 12px 20px;
      font-size: 13px; color: #1e40af; text-align: center;
      cursor: pointer; margin: 12px 16px; border-radius: var(--radius-sm);
    }
    .install-banner.show { display: block; }

    /* FAB */
    .fab {
      position: fixed; bottom: 90px; right: 20px; z-index: 150;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #fff; border: none;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,86,219,.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .fab:active { transform: scale(.9); }

    /* Custom badge */
    .custom-badge {
      font-size: 9px; background: #fef3c7; color: #92400e;
      padding: 1px 6px; border-radius: 6px; margin-left: 6px;
    }

    /* Sync status */
    .sync-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .sync-status {
      font-size: 11px; padding: 3px 10px; border-radius: 12px;
      cursor: pointer; white-space: nowrap;
      transition: background .2s;
    }
    .sync-status.synced { background: #d1fae5; color: #065f46; }
    .sync-status.syncing { background: #fef3c7; color: #92400e; animation: pulse 1.5s infinite; }
    .sync-status.offline { background: #fee2e2; color: #991b1b; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }

    .settings-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--card);
      font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .settings-btn:active { background: var(--bg); }

    /* Settings modal */
    .settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.4); align-items: center; justify-content: center;
    }
    .settings-overlay.show { display: flex; }
    .settings-card {
      background: var(--card); border-radius: var(--radius);
      padding: 24px; width: 92%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .settings-card h3 { font-size: 16px; margin-bottom: 8px; }
    .settings-card .hint {
      font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;
    }
    .settings-input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 8px;
    }
    .settings-card .help {
      font-size: 11px; color: var(--text-secondary); margin-bottom: 16px;
    }
    .settings-card .help a { color: var(--primary); }
    .settings-ok {
      width: 100%; padding: 10px; background: var(--primary);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 14px; cursor: pointer;
    }
  </style>
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>📋 央国企求职追踪</h1>
      <div class="header-sub">物流管理 · 河北地质大学 · 2027届</div>
    </div>
    <div class="sync-wrap">
      <span class="sync-status offline" id="syncStatus" onclick="showSettings()">☁️ 未连接</span>
      <button class="settings-btn" onclick="showSettings()" title="同步设置">⚙️</button>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats" id="statsRow"></div>

<!-- Filters -->
<div class="filters" id="filterRow"></div>

<!-- Search -->
<div class="search-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索企业名称、岗位...">
</div>

<!-- Install banner -->
<div class="install-banner" id="installBanner" onclick="installPWA()">
  📲 点此安装到手机桌面，使用更方便
</div>

<!-- Company list -->
<div class="list" id="companyList"></div>

<!-- Export bar -->
<div class="export-bar">
  <button class="btn-sm" onclick="exportCSV()">📥 导出CSV</button>
  <button class="btn-sm" onclick="resetAll()">🔄 重置数据</button>
  <span style="font-size:11px;color:var(--text-secondary);align-self:center;margin-left:auto;">
    共 <b id="totalCount">0</b> 家企业
  </span>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddSheet()" title="添加企业">+</button>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="setView('all')">
    <span class="nav-icon">🏢</span>全部
  </div>
  <div class="nav-item" onclick="setView('todo')">
    <span class="nav-icon">📝</span>待投递
  </div>
  <div class="nav-item" onclick="setView('progress')">
    <span class="nav-icon">⏳</span>进行中

  <div class="nav-item" onclick="setView('done')">
    <span class="nav-icon">✅</span>已结束
  </div>
</div>

<!-- Detail Sheet -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle"></div>
      <span class="sheet-close" onclick="closeSheet()">✕</span>
    </div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Settings modal -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)hideSettings()">
  <div class="settings-card">
    <h3>☁️ 同步设置</h3>
    <p class="hint">配置 GitHub Token 后，多设备数据自动同步</p>
    <input class="settings-input" type="password" id="tokenInput" placeholder="ghp_... 粘贴你的 GitHub Token">
    <p class="help">
      需<b> classic token</b>，勾选 repo 权限。<br>
      <a href="https://github.com/settings/tokens" target="_blank">→ 生成 Token</a>
    </p>
    <div class="help" id="settingsNote" style="margin-bottom:12px"></div>
    <button class="settings-ok" onclick="saveToken()">💾 保存并同步</button>
    <button class="settings-ok" style="background:#e2e8f0;color:#1a202c;margin-top:8px;" id="btnForceSync" onclick="forceSync()">🔄 立即同步</button>
  </div>
</div>

let currentFilter = 'all';
let currentView = 'all';

function getCustomCompanies() {
  const raw = localStorage.getItem('job-tracker-custom');
  return raw ? JSON.parse(raw) : [];
}

function saveCustomCompanies(list) {
  localStorage.setItem('job-tracker-custom', JSON.stringify(list));
}

function getAllCompanies() {
  return [...COMPANIES, ...getCustomCompanies()];
}

function getData() {
  const raw = localStorage.getItem('job-tracker-data');
  const all = getAllCompanies();
  if (raw) {
    const data = JSON.parse(raw);
    // Ensure all companies (including newly added custom) have entries
    all.forEach(c => {
      if (!data[c.id]) {
        data[c.id] = { status: '未投递', applyDate: '', applyChannel: '', applyUrl: '', notes: '' };
      }
    });
    return data;
  }
  // Init with defaults
  const data = {};
  all.forEach(c => {
    data[c.id] = {
      status: '未投递',
      applyDate: '',
      applyChannel: '',
      applyUrl: '',
      notes: ''
    };
  });
  saveData(data);
  return data;
}

function saveData(data) {
  localStorage.setItem('job-tracker-data', JSON.stringify(data));
}

// ===== RENDER =====
function renderStats() {
  const data = getData();
  const total = getAllCompanies().length;
  let applied = 0, interviewing = 0, offered = 0;
  Object.values(data).forEach(d => {
    if (d.status !== '未投递' && d.status !== '放弃') applied++;
    if (d.status === '面试') interviewing++;
    if (d.status === '已录用') offered++;
  });

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card total"><div class="num">${total}</div><div class="label">目标企业</div></div>
    <div class="stat-card applied"><div class="num">${applied}</div><div class="label">已投递/进行中</div></div>
    <div class="stat-card interview"><div class="num">${interviewing}</div><div class="label">面试中</div></div>
    <div class="stat-card offer"><div class="num">${offered}</div><div class="label">已录用</div></div>
    <div class="stat-card"><div class="num">${Math.round(applied/total*100)}%</div><div class="label">投递率</div></div>
  `;
}

function renderFilters() {
  const customCount = getCustomCompanies().length;
  const tiers = ['all', 'tier1', 'tier2', 'tier3', 'tier4', 'custom'];
  const labels = { all: '全部', tier1: '基建工程局', tier2: '央企分支', tier3: '河北省属', tier4: '其他央企', custom: `⭐ 自定义${customCount?'('+customCount+')':''}` };
  document.getElementById('filterRow').innerHTML = tiers.map(t =>
    `<button class="filter-btn ${currentFilter===t?'active':''}" onclick="setFilter('${t}')">${labels[t]}</button>`
  ).join('');
}

function renderList() {
  const data = getData();
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const all = getAllCompanies();

  let companies = all.filter(c => {
    if (currentFilter === 'custom') return c.custom;
    if (currentFilter !== 'all' && c.tier !== currentFilter) return false;
    const status = data[c.id].status;
    if (currentView === 'todo') return status === '未投递';
    if (currentView === 'progress') return ['已投递','测评中','笔试','面试'].includes(status);
    if (currentView === 'done') return ['已录用','已拒绝','放弃'].includes(status);
    return true;
  });

  if (search) {
    companies = companies.filter(c =>
      c.name.toLowerCase().includes(search) ||
      c.positions.toLowerCase().includes(search) ||
      c.location.toLowerCase().includes(search)
    );
  }

  document.getElementById('totalCount').textContent = companies.length;

  if (companies.length === 0) {
    document.getElementById('companyList').innerHTML = `
      <div class="empty"><div class="empty-icon">📭</div><p>没有匹配的企业</p></div>`;
    return;
  }

  document.getElementById('companyList').innerHTML = companies.map(c => {
    const d = data[c.id];
    const tierInfo = c.custom ? { name: '自定义', tag: 't4' } : TIER_LABELS[c.tier];
    return `
      <div class="company-card ${c.tier||'tier4'}" onclick="openDetail('${c.id}')">
        <div class="card-top">
          <div class="card-name">${c.name}${c.custom?'<span class="custom-badge">自建</span>':''}</div>
          <span class="card-tier ${tierInfo.tag}">${tierInfo.name}</span>
        </div>
        <div class="card-info">
          <span>📌 ${c.positions}</span>
          <span>📍 ${c.location}</span>
          ${c.salary ? `<span>💰 ${c.salary}</span>` : ''}
        </div>
        <div class="card-bottom">
          <span class="status-badge status-${d.status}">${d.status}</span>
          <span class="card-date">${d.applyDate || '未记录日期'}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderAll() {
  renderStats();
  renderFilters();
  renderList();
}

function exportCSV() {
  const data = getData();
  const rows = [['企业名称','梯队','岗位','地点','薪资','状态','投递日期','投递渠道','投递链接','备注']];
  getAllCompanies().forEach(c => {
    const d = data[c.id];
    const tierName = c.custom ? '自定义' : TIER_LABELS[c.tier].name;
    rows.push([c.name, tierName, c.positions, c.location, c.salary, d.status, d.applyDate, d.applyChannel, d.applyUrl, d.notes]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `央国企求职追踪_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV已下载！');
}

}

function removeCustomCompany(companyId) {
  if (!confirm('确定要删除这家企业吗？此操作不可恢复！')) return;

  saveCustomCompanies(customList);
  const data = getData();
  delete data[companyId];
  saveData(data);
  closeSheet();
  renderAll();
  showToast('已删除');
}

async function loadCloud() {
  const url = `https://raw.githubusercontent.com/${SYNC.owner}/${SYNC.repo}/main/${SYNC.path}?t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  return await res.json();
}

async function pushCloud(cloudData) {
  const token = getToken();
  if (!token) return false;
  const apiUrl = `https://api.github.com/repos/${SYNC.owner}/${SYNC.repo}/contents/${SYNC.path}`;

  // 获取当前文件 SHA
  let sha = null;
  try {
    const res = await fetch(apiUrl);
    if (res.ok) { const fi = await res.json(); sha = fi.sha; }
  } catch(e) {}

  const json = JSON.stringify(cloudData, null, 2);
  const body = {
    message: '📊 同步求职数据 ' + new Date().toISOString().slice(0, 16).replace('T', ' '),
    content: btoa(unescape(encodeURIComponent(json))),
    branch: 'main'
  };
  if (sha) body.sha = sha;

  const res = await fetch(apiUrl, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.ok;
}

// 构建云端数据结构
function buildCloudPayload() {
  const rawData = JSON.parse(localStorage.getItem('job-tracker-data') || '{}');
  const now = Date.now();
  // 确保所有数据条目标記时间戳
  for (const id in rawData) {
    if (typeof rawData[id] === 'object' && !rawData[id]._t) {
      rawData[id]._t = now;
    }
  }
  return {
    v: 2,
    t: now,
    data: rawData,
    custom: JSON.parse(localStorage.getItem('job-tracker-custom') || '[]')
  };
}

// 合并策略：按每个企业的最新时间戳决定，没有时间戳的保留较有价值的一方
function mergeCloudIntoLocal(cloud) {
  if (!cloud || !cloud.data) return;

  const localData = JSON.parse(localStorage.getItem('job-tracker-data') || '{}');
  const localCustom = JSON.parse(localStorage.getItem('job-tracker-custom') || '[]');
  let changed = false;

  // 合并追踪数据
  const merged = { ...localData };
  Object.keys(cloud.data).forEach(id => {
    const cd = cloud.data[id];
    const ld = localData[id];
    if (!ld) {
      // 本地没有，直接用云端
      merged[id] = cd;
      changed = true;
    } else if (cd._t && (!ld._t || cd._t > ld._t)) {
      // 云端更新时间更新，用云端
      merged[id] = cd;
      changed = true;
    } else if (!cd._t && !ld._t) {
      // 都没有时间戳，取数据更丰富的一方
      const cdLen = (cd.status !== '未投递' ? 1 : 0) + (cd.notes ? cd.notes.length : 0);
      const ldLen = (ld.status !== '未投递' ? 1 : 0) + (ld.notes ? ld.notes.length : 0);
      if (cdLen > ldLen) { merged[id] = cd; changed = true; }
    }
  });
  if (changed) {
    localStorage.setItem('job-tracker-data', JSON.stringify(merged));
  }

  // 合并自定义企业（按 id 去重，取并集）
  let customChanged = false;
  const mergedCustom = [...localCustom];
  (cloud.custom || []).forEach(cc => {
    if (!mergedCustom.find(c => c.id === cc.id)) {
      mergedCustom.push(cc);
      customChanged = true;
    }
  });
  if (customChanged) {
    localStorage.setItem('job-tracker-custom', JSON.stringify(mergedCustom));
  }
}

// 主同步流程
async function doSync() {
  if (!getToken()) { setSyncStatus('offline', '☁️ 未连接'); return; }
  setSyncStatus('syncing', '🔄 同步中...');
  try {
    const cloud = await loadCloud();
    if (cloud && cloud.data) {
      // 云端有数据，合入本地
      mergeCloudIntoLocal(cloud);
      // 如果本地也有更新，推回云端
      const localPayload = buildCloudPayload();
      if (cloud.t && localPayload.t > cloud.t) {
        // 本地更新
      }
      // 始终推送（本地可能是和云端相同的合并结果，也可能是更新的）
      const ok = await pushCloud(localPayload);
      setSyncStatus(ok ? 'synced' : 'offline', ok ? '✅ 已同步' : '⚠️ 推送失败');
      if (ok) {
        console.log('☁️ 同步成功');
      }
    } else {
      // 云端无数据，推送本地
      const payload = buildCloudPayload();
      const ok = await pushCloud(payload);
      setSyncStatus(ok ? 'synced' : 'offline', ok ? '✅ 已同步' : '⚠️ 推送失败');
    }
    // 重新渲染以显示合并后的数据
    renderAll();
  } catch(e) {
    setSyncStatus('offline', '⚠️ 网络错误');
    console.error('Sync error:', e);
  }
}

// 主动同步（用户手动点）
async function forceSync() {
  hideSettings();
  showToast('正在同步...');
  await doSync();
  showToast('同步完成');
}

// 本地保存时自动触发（带防抖）
let syncTimer = null;
function scheduleSync() {
  if (!getToken()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => doSync(), 1500);
}

// 拦截原生 saveData 和 saveCustomCompanies，加时间戳并触发同步
const _origSaveData = saveData;
const _origSaveCustom = saveCustomCompanies;
const _origGetData = getData;

saveData = function(data) {
  // 对比旧数据，只为有变化的条目更新时间戳
  const old = _origGetData();
  for (const id in data) {
    const d = data[id];
    if (typeof d === 'object' && d !== null) {
      const oldEntry = old[id];
      if (!oldEntry || d.status !== oldEntry.status || d.applyDate !== oldEntry.applyDate ||
          d.applyChannel !== oldEntry.applyChannel || d.notes !== oldEntry.notes) {
        d._t = Date.now();
      } else {
        d._t = oldEntry._t || Date.now();
      }
    }
  }
  _origSaveData(data);
  scheduleSync();
};

saveCustomCompanies = function(list) {
  _origSaveCustom(list);
  scheduleSync();
};

// ===== INIT =====
// 启动时自动拉取云端数据
(async function initSync() {
  if (getToken()) {
    setSyncStatus('syncing', '🔄 加载中...');
    try {
      const cloud = await loadCloud();
      if (cloud && cloud.data) {
        mergeCloudIntoLocal(cloud);
        setSyncStatus('synced', '✅ 已同步');
      } else {
        // 云端无数据，推送本地
        const payload = buildCloudPayload();
        await pushCloud(payload);
        setSyncStatus('synced', '✅ 已同步');
      }
    } catch(e) {
      setSyncStatus('offline', '⚠️ 网络错误');
    }
  } else {
    setSyncStatus('offline', '☁️ 未连接');
  }
  renderAll();
})();
